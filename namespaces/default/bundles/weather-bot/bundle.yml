# bundle.yml — mcp_bundled の定義 + ビルド宣言
apiVersion: juice/v1
kind: mcp_bundled
name: weather-bot
namespace: default

# build で生成する docker イメージ名（タグなし）と version
image: juice/weather-bot
version: 0.0.1

# 会話に使う LLM。API キーは環境変数 or ファイルで注入（値は書かない）
llm:
  provider: anthropic
  model: claude-opus-4-8
  api_key_env: ANTHROPIC_API_KEY

# 結線（定義）
subagent: forecaster
skills:
  - report-weather
tools:
  weather:
    env:
      WEATHER_API_KEY: ${WEATHER_API_KEY}

# vendoring 対象（省略時は subagent/skills/tools）
include:
  - subagent
  - skills
  - tools
